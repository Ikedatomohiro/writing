    avoid:
      - "絶対儲かる"
      - "今すぐ始めないと損"
      - "必ず利益が出る"
      - "元本保証（誤解を招く表現）"

  common_sections:
    - "この記事でわかること"
    - "基本知識"
    - "具体的な始め方"
    - "注意点・リスク"
    - "まとめ・次のステップ"
